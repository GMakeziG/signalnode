services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signalnode
      POSTGRES_PASSWORD: signalnode
      POSTGRES_DB: signalnode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalnode"]
      interval: 5s
      timeout: 5s
      retries: 5

  signalnode-api:
    build:
      context: .
      dockerfile: signalnode-api/Dockerfile
    environment:
      DATABASE_URL: postgres://signalnode:signalnode@postgres:5432/signalnode
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  signalnode-core:
    build:
      context: .
      dockerfile: signalnode-core/Dockerfile
    environment:
      DATABASE_URL: postgres://signalnode:signalnode@postgres:5432/signalnode
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
